upstream flask_backend {
    server backend:8000;
}

upstream nextjs_frontend {
    server frontend:3000;
}

# Main Server Block (Listening on 80 for now to avoid SSL errors without certs)
# Configure Cloudflare to "Flexible" SSL or setup certs and uncomment 443 block
server {
    listen 80;
    server_name ecopoints.org www.ecopoints.org api.ecopoints.org localhost;

    # Phase 4D — Security_Headers (Requirements 4D.21, 4D.22)
    # `always` ensures these are emitted on error responses (4xx/5xx) too.
    # Inherited by the location blocks below since none of them define their own add_header.
    add_header X-Content-Type-Options    "nosniff"                                  always;
    add_header X-Frame-Options           "DENY"                                     always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"          always;
    # CSP is launched in Report-Only mode for at least one release window before being
    # promoted to enforcing `Content-Security-Policy` (Requirement 4D.22).
    # Baseline tuned for Next.js client + same-origin Flask API at /api/*:
    #   - 'unsafe-inline' is currently required for Next.js's inline bootstrap script and
    #     styled-jsx / Tailwind inline styles. Tighten with nonces/hashes once observed.
    #   - connect-src 'self' covers the Flask backend, which is same-origin via this proxy.
    #   - frame-ancestors 'none' mirrors X-Frame-Options: DENY for modern browsers.
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'" always;

    # Backend API - matches /api path or the api subdomain
    location / {
        # Check against host to distinguish frontend vs api subdomain
        if ($host = "api.ecopoints.org") {
            proxy_pass http://flask_backend;
            break;
        }
        
        proxy_pass http://nextjs_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Use existing Cloudflare header or fallback to request scheme
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
    
    # Explicit API route support if not using subdomain
    location /api {
        proxy_pass http://flask_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}
