upstream flask_backend {
    server backend:8000;
}

upstream nextjs_frontend {
    server frontend:3000;
}

# Main Server Block (Listening on 80 for now to avoid SSL errors without certs)
# Configure Cloudflare to "Flexible" SSL or setup certs and uncomment 443 block
server {
    listen 80;
    server_name ecopoints.org www.ecopoints.org rewards.ecopoints.org api.ecopoints.org localhost;
    
    # Backend API - matches /api path or the api subdomain
    location / {
        # Check against host to distinguish frontend vs api subdomain
        if ($host = "api.ecopoints.org") {
            proxy_pass http://flask_backend;
            break;
        }
        
        proxy_pass http://nextjs_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Explicit API route support if not using subdomain
    location /api {
        proxy_pass http://flask_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
