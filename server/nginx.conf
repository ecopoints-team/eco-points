# Nginx configuration for eco-points RVM Project
# Location: /etc/nginx/sites-available/eco-points
# Symlink: /etc/nginx/sites-enabled/eco-points

upstream flask_backend {
    server 127.0.0.1:8000;
}

upstream nextjs_frontend {
    server 127.0.0.1:3000;
}

# HTTP -> HTTPS Redirect for all domains
server {
    listen 80;
    server_name ecopoints.org www.ecopoints.org rewards.ecopoints.org api.ecopoints.org;
    
    # Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 1. API Server Block (api.ecopoints.org)
# Traffic Source: RVM/RPi devices and User Browser (AJAX)
server {
    listen 443 ssl http2;
    server_name api.ecopoints.org;

    # SSL - Update paths to your actual certificates
    # ssl_certificate /etc/letsencrypt/live/ecopoints.org/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/ecopoints.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Cloudflare Real IP Config
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    access_log /var/log/nginx/api-access.log;
    error_log /var/log/nginx/api-error.log;

    location / {
        proxy_pass http://flask_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase timeout for long RPi operations if needed
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }
}

# 2. Frontend Server Block (Main Site and Rewards)
# Traffic Source: User Browsers
server {
    listen 443 ssl http2;
    server_name ecopoints.org www.ecopoints.org rewards.ecopoints.org;

    # SSL - Update paths to your actual certificates
    # ssl_certificate /etc/letsencrypt/live/ecopoints.org/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/ecopoints.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Cloudflare Real IP Config (Same as above)
    real_ip_header CF-Connecting-IP;

    access_log /var/log/nginx/web-access.log;
    error_log /var/log/nginx/web-error.log;

    location / {
        proxy_pass http://nextjs_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

